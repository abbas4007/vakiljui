services:

  postgres:
    image: postgres:15
    container_name: dadvar_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dadvar_net

  redis:
    image: redis:7-alpine
    container_name: dadvar_redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - dadvar_net

  web:
    build: .
    container_name: dadvar_web
    restart: unless-stopped
    env_file: .env

    command: >
      sh -c "python manage.py collectstatic --noinput &&
             gunicorn dadvar.wsgi:application
             --bind 0.0.0.0:8000
             --workers 2
             --timeout 60
             --log-level info
             --access-logfile -
             --error-logfile -"

    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
      - ./logs:/app/logs

    depends_on:
      - postgres
      - redis

    networks:
      - dadvar_net

    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    container_name: dadvar_nginx
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro

      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro

    depends_on:
      - web

    networks:
      - dadvar_net

  certbot:
    image: certbot/certbot
    container_name: dadvar_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  celery:
    build: .
    container_name: dadvar_celery
    command: celery -A dadvar worker -l info
    env_file: .env
    depends_on:
      - postgres
      - redis
    networks:
      - dadvar_net

volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:

networks:
  dadvar_net:
    driver: bridge