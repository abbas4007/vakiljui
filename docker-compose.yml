version: '3.8'

services:
  nginx:
    build: ./nginx
    container_name: dadvar-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static_volume:/static
      - media_volume:/media
      - ./ssl:/etc/ssl:ro  # گواهی‌های SSL
    depends_on:
      - django
    networks:
      - dadvar-network
    restart: unless-stopped

  django:
    build: .
    container_name: dadvar-django
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    expose:
      - "8000"
    environment:
      - DEBUG=False
      - DJANGO_ENV=production
    depends_on:
      - postgres
      - redis
    networks:
      - dadvar-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: dadvar-postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=dadvar
      - POSTGRES_USER=dadvar_user
      - POSTGRES_PASSWORD=your_secure_password
    networks:
      - dadvar-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: dadvar-redis
    networks:
      - dadvar-network
    restart: unless-stopped

volumes:
  static_volume:
  media_volume:
  postgres_data:

networks:
  dadvar-network:
    driver: bridge