server {
    listen 80;
    server_name vakiljuy.ir www.vakiljuy.ir 5.253.25.83 94.101.187.170;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Static files (از مسیر واقعی پروژه)
    location /static/ {
        alias /var/www/vakiljui/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files
    location /media/ {
        alias /var/www/vakiljui/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # برای رفع مشکل فونت
    location ~* \.(woff|woff2|ttf|eot)$ {
        alias /var/www/vakiljui/static/fonts/;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # برگردوندن فایل index.html یا صفحه پیش‌فرض
    location / {
        root /var/www/vakiljui;
        try_files $uri $uri/ /index.html =404;
    }
}