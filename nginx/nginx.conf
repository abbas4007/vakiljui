user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # تنظیمات پایه
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;

    # فشرده‌سازی (Gzip) - برای سئو و سرعت
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/x-javascript
        image/svg+xml
        font/ttf
        font/otf
        image/x-icon;

    # کش صفحات استاتیک
    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # لاگ‌ها
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # تنظیمات SSL (برای پروداکشن)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

    # آپاستریم برای اتصال به Gunicorn (جنگو)
    upstream django {
        server django:8000;  # نام سرویس در docker-compose
        keepalive 32;
    }

    # تنظیمات ریت لیمیت (جلوگیری از حملات)
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # ------------------- سرور اصلی (HTTP) -------------------
    server {
        listen 80;
        listen [::]:80;
        server_name dadvar.ir www.dadvar.ir;

        # ریدایرکت به HTTPS
        return 301 https://$server_name$request_uri;
    }

    # ------------------- سرور اصلی (HTTPS) -------------------
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name dadvar.ir www.dadvar.ir;

        # مسیر گواهی‌های SSL (با Certbot یا Let's Encrypt)
        ssl_certificate /etc/ssl/certs/dadvar.crt;
        ssl_certificate_key /etc/ssl/private/dadvar.key;

        # هدرهای امنیتی (برای سئو و امنیت)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net; img-src 'self' data:; connect-src 'self';" always;

        # فایل ربات‌ها و نقشه سایت
        location = /robots.txt {
            alias /usr/share/nginx/html/robots.txt;
            log_not_found off;
            access_log off;
        }

        location = /sitemap.xml {
            proxy_pass http://django/sitemap.xml;
            proxy_set_header Host $host;
            log_not_found off;
        }

        location = /llms.txt {
            proxy_pass http://django/llms.txt;
            proxy_set_header Host $host;
        }

        # فایل‌های استاتیک جنگو (CSS, JS)
        location /static/ {
            alias /static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # فایل‌های مدیا (تصاویر وکلا)
        location /media/ {
            alias /media/;
            expires 7d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # آیکون ساید (favicon)
        location = /favicon.ico {
            alias /static/favicon.ico;
            access_log off;
            log_not_found off;
        }

        # صفحه اصلی و پروکسی به جنگو
        location / {
            proxy_pass http://django;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;

            # تنظیمات keepalive
            proxy_buffering off;
            proxy_redirect off;
            proxy_set_header Connection "";

            # تایم‌اوت‌ها
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # صفحات مدیریت (ادمین)
        location /admin/ {
            proxy_pass http://django/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # ریت لیمیت برای امنیت
            limit_req zone=api burst=5 nodelay;
        }

        # لاگ خطاها
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}